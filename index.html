<!DOCTYPE html>
<html>
<head>
<title>Student Login System</title>

<style>

body{
font-family: Arial;
background:#d8f3f0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#2b6cff;
color:white;
border:none;
border-radius:5px;
}

.link{
color:blue;
cursor:pointer;
font-size:14px;
}

.error{
color:red;
font-size:13px;
}

</style>

</head>

<body>

<div class="container">

<h2 id="formTitle">Login</h2>

<!-- LOGIN FORM -->
<form id="loginForm" action="login.php" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit" name="login">Login</button>

</form>


<!-- REGISTER FORM -->
<form id="registerForm" action="signup.php" method="POST" style="display:none;">

<input type="text" name="fullname" id="fullname" placeholder="Full Name">
<div id="nameError" class="error"></div>

<input type="email" name="email" id="email" placeholder="Email">
<div id="emailError" class="error"></div>

<input type="text" name="phone" id="phone" placeholder="Phone">
<div id="phoneError" class="error"></div>

<input type="password" name="password" id="password" placeholder="Password">

<input type="password" id="confirmPassword" placeholder="Confirm Password">
<div id="passError" class="error"></div>

<button type="submit" name="signup">Register</button>

</form>

<p class="link" onclick="toggleForm()">Create account</p>

</div>


<script>

function toggleForm(){

let login=document.getElementById("loginForm");
let register=document.getElementById("registerForm");
let title=document.getElementById("formTitle");

if(login.style.display=="none"){
login.style.display="block";
register.style.display="none";
title.innerText="Login";
}
else{
login.style.display="none";
register.style.display="block";
title.innerText="Register";
}

}

document.getElementById("registerForm").addEventListener("submit",function(e){

let name=document.getElementById("fullname").value;
let email=document.getElementById("email").value;
let phone=document.getElementById("phone").value;
let pass=document.getElementById("password").value;
let confirm=document.getElementById("confirmPassword").value;

let valid=true;

if(name.length<3){
document.getElementById("nameError").innerText="Name must be at least 3 characters";
valid=false;
}else{
document.getElementById("nameError").innerText="";
}

let emailPattern=/^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(!email.match(emailPattern)){
document.getElementById("emailError").innerText="Invalid email";
valid=false;
}else{
document.getElementById("emailError").innerText="";
}

if(phone.length!=10 || isNaN(phone)){
document.getElementById("phoneError").innerText="Enter valid 10 digit phone";
valid=false;
}else{
document.getElementById("phoneError").innerText="";
}

if(pass!=confirm){
document.getElementById("passError").innerText="Passwords do not match";
valid=false;
}else{
document.getElementById("passError").innerText="";
}

if(!valid){
e.preventDefault();
}

});

</script>

</body>
</html>
